<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA | Cognitive Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&family=Inter:wght@300;400;600&display=swap');
      
      body {
        font-family: 'Rajdhani', sans-serif;
        background-color: #030303;
        color: #e0e0e0;
        overflow: hidden; /* Prevent scroll on body for full app feel */
      }
      
      .font-display {
        font-family: 'Orbitron', sans-serif;
      }

      .font-tech {
        font-family: 'Rajdhani', sans-serif;
      }

      /* Scanline Effect */
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        position: fixed;
        pointer-events: none;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        opacity: 0.15;
      }

      /* CRT Flicker */
      @keyframes flicker {
        0% { opacity: 0.97; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.95; }
        20% { opacity: 0.99; }
        100% { opacity: 0.97; }
      }
      
      .crt-flicker {
        animation: flicker 0.15s infinite;
      }

      /* Glitch Animation */
      @keyframes glitch-skew {
        0% { transform: skew(0deg); }
        20% { transform: skew(-2deg); }
        40% { transform: skew(2deg); }
        60% { transform: skew(-1deg); }
        80% { transform: skew(1deg); }
        100% { transform: skew(0deg); }
      }

      .glitch-hover:hover {
        animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        color: #00f0ff;
        text-shadow: 2px 0 #ff0000, -2px 0 #0000ff;
      }

      @keyframes nebula-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      @keyframes hologram-in {
        0% { transform: scale(0.9) translateY(20px); opacity: 0; filter: blur(10px); }
        100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 0; }
    </style>
<link rel="stylesheet" href="/src/index.css">
</head>
  <body>
    <div class="scanlines"></div>
    <div id="root" class="h-screen w-screen flex flex-col"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

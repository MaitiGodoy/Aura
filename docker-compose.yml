services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=8080
    restart: unless-stopped
